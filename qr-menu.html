<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Temassız Dijital Mobil QR Menü - Taze, hızlı ve lezzetli!">
  <title>🍽️ Dijital Mobil QR Menü</title>
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0b0c15;
      --surface: rgba(20, 22, 37, 0.6);
      --surface-hover: rgba(32, 35, 59, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(255, 107, 53, 0.4);
      --primary: #ff6b35;
      --primary-glow: rgba(255, 107, 53, 0.25);
      --success: #28a745;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --font-outfit: 'Outfit', sans-serif;
      --font-inter: 'Inter', sans-serif;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 10% 10%, rgba(255, 107, 53, 0.05) 0px, transparent 50%),
        radial-gradient(at 90% 90%, rgba(40, 116, 240, 0.05) 0px, transparent 50%);
      color: var(--text);
      font-family: var(--font-inter);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 40px;
    }

    /* CUSTOM SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.2);
    }

    /* HEADER */
    header {
      background: rgba(11, 12, 21, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      font-size: 28px;
      filter: drop-shadow(0 0 10px rgba(255, 107, 53, 0.3));
    }

    .brand-details {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-family: var(--font-outfit);
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .brand-tag {
      font-size: 10px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .table-badge {
      background: linear-gradient(135deg, var(--primary), #e65c26);
      box-shadow: 0 4px 12px var(--primary-glow);
      color: #fff;
      font-family: var(--font-outfit);
      font-weight: 800;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 50px;
      letter-spacing: 0.5px;
    }

    /* SEARCH BOX */
    .search-container {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px 12px 42px;
      font-size: 14px;
      color: var(--text);
      font-family: var(--font-inter);
      outline: none;
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* CATEGORIES BAR */
    .categories-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 20px;
      background: rgba(11, 12, 21, 0.3);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 110px;
      z-index: 90;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .categories-bar::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 50px;
      color: var(--text-muted);
      font-family: var(--font-outfit);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
    }

    .category-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 6px 20px var(--primary-glow);
      transform: translateY(-1px);
    }

    /* CONTAINER */
    .menu-container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
    }

    .section-title {
      font-family: var(--font-outfit);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    /* PRODUCTS GRID */
    .products-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      gap: 16px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.02), transparent);
      transform: translateX(-100%);
      transition: 0.6s;
    }

    .product-card:hover {
      background: var(--surface-hover);
      border-color: rgba(255, 107, 53, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .product-card:hover::before {
      transform: translateX(100%);
    }

    .product-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product-name {
      font-family: var(--font-outfit);
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .product-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .product-price {
      font-family: var(--font-outfit);
      font-size: 18px;
      font-weight: 900;
      color: var(--primary);
    }

    .view-badge {
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.2);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition);
    }

    .product-card:hover .view-badge {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .empty-sub {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 8, 14, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #141625;
      border-top: 2px solid var(--primary);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 600px;
      padding: 24px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.show .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .modal-title-container {
      flex: 1;
    }

    .modal-title {
      font-family: var(--font-outfit);
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
    }

    .modal-category {
      font-size: 11px;
      color: var(--primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-close {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.05);
    }

    .modal-body {
      margin-bottom: 24px;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .detail-label {
      color: var(--text-dim);
    }

    .detail-val {
      font-weight: 600;
      color: var(--text);
    }

    .modal-price-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 107, 53, 0.05);
      border: 1px solid rgba(255, 107, 53, 0.15);
      padding: 16px;
      border-radius: var(--radius-md);
      margin-top: 20px;
    }

    .price-label {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .modal-price {
      font-family: var(--font-outfit);
      font-size: 26px;
      font-weight: 900;
      color: var(--primary);
    }

    .modal-footer {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius-md);
      border: none;
      font-family: var(--font-outfit);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .modal-btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .modal-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* TOAST */
    #toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: calc(100% - 40px);
      max-width: 400px;
    }

    .toast {
      background: rgba(20, 22, 37, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: slideUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
    }

    .toast-success {
      border-left: 4px solid var(--success);
    }
    
    .toast-success span {
      color: var(--success);
      font-weight: bold;
    }

    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes fadeOut {
      to { transform: translateY(-10px); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div class="brand">
        <div class="brand-logo">🍢</div>
        <div class="brand-details">
          <div class="brand-name" id="menu-restaurant-name">KARDO Kebap</div>
          <div class="brand-tag">Dijital Mobil Menü</div>
        </div>
      </div>
      <div class="table-badge" id="table-label">MASA --</div>
    </div>
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="Yemek veya içecek ara..." oninput="filterMenu()">
    </div>
  </header>

  <!-- CATEGORIES BAR -->
  <div class="categories-bar" id="categories-bar"></div>

  <!-- CONTAINER -->
  <div class="menu-container">
    <div class="section-title" id="section-title">
      <span>🍢</span> Kebaplar & Izgaralar
    </div>
    
    <div class="products-list" id="products-list"></div>
  </div>

  <!-- DETAILS MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title-container">
          <div class="modal-category" id="m-category">Kategori</div>
          <div class="modal-title" id="m-name">Adana Kebap</div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-desc" id="m-desc">Açıklama</div>
        
        <div class="detail-row">
          <span class="detail-label">Servis Süresi</span>
          <span class="detail-val">12-15 Dakika</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Alerjen Uyarısı</span>
          <span class="detail-val" id="m-allergen">Gluten içerebilir</span>
        </div>

        <div class="modal-price-container">
          <span class="price-label">Fiyat</span>
          <span class="modal-price" id="m-price">0.00 ₺</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Menüye Dön</button>
      </div>
    </div>
  </div>

  <!-- TOASTS -->
  <div id="toast-container"></div>

  <!-- Firebase Compat SDKs (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- DATA & MENUMOBI LOGIC SCRIPT -->
  <script src="js/data.js"></script>
  <script src="js/qr-menu.js"></script>
</body>
</html>
